# ============================================================
# Cloud Mac build for Trace's iOS app (Capacitor).
# Runs on Codemagic's macOS machines — you never need a Mac.
#
# Prerequisites (Codemagic UI):
#   - Add your App Store Connect API key as an integration named
#     exactly "TRACE_APP_STORE_KEY".
#   - IMPORTANT: that key must have **Admin** access, because Apple
#     only lets Admin keys create the signing certificate.
#
# This recipe creates the distribution certificate + provisioning
# profile on the first run, signs the app, and uploads to TestFlight.
# Docs: https://docs.codemagic.io/yaml-code-signing/signing-ios/
# ============================================================
workflows:
  ios-capacitor:
    name: Trace iOS (Capacitor)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: TRACE_APP_STORE_KEY
    environment:
      node: 20.14.0
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "app.trace.gpx"
    scripts:
      - name: Install web dependencies
        script: npm ci
      - name: Build web app + sync to iOS
        script: |
          npm run build
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Set up code signing (creates cert + profile on first run)
        script: |
          keychain initialize
          # Create a NEW distribution certificate (generates + saves its
          # private key locally so the build can actually sign).
          app-store-connect create-certificate \
            --type IOS_DISTRIBUTION \
            --save
          keychain add-certificates
          # Create/fetch the App Store provisioning profile for the app.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          xcode-project use-profiles
      - name: Build signed IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
