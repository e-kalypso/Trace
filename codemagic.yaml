# ============================================================
# Cloud Mac build for Trace's iOS app (Capacitor).
#
# Manual code signing: upload BOTH files in the Codemagic UI
# (Team settings -> Code signing identities):
#   - iOS certificate: ios_distribution.p12  (password: TracePwd2026)
#   - iOS provisioning profile: the .mobileprovision you create in the
#     Apple Developer portal (App Store, bundle id app.trace.gpx).
# The ios_signing block below then applies them — no scripts guess anything.
# ============================================================
workflows:
  ios-capacitor:
    name: Trace iOS (Capacitor)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: TRACE_APP_STORE_KEY
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.trace.gpx
      node: 20.14.0
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install web dependencies
        script: npm ci
      - name: Build web app + sync to iOS
        script: |
          npm run build
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Apply the uploaded signing files to the Xcode project
        script: |
          xcode-project use-profiles
      - name: Build signed IPA
        script: |
          cd ios/App
          # numero de build unique exige par TestFlight a chaque envoi
          agvtool new-version -all $BUILD_NUMBER
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      # build-ipa runs from ios/App, so the .ipa lands under ios/App/build/
      - ios/App/build/ios/ipa/*.ipa
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
