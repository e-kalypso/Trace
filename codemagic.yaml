# ============================================================
# Build cloud Mac — Trace v3, app native SwiftUI.
# Le projet Xcode est GÉNÉRÉ par XcodeGen depuis project.yml
# (rien de fragile commité), puis signé et envoyé sur TestFlight.
#
# Signature (déjà en place dans Codemagic, NE PAS TOUCHER) :
#   - certificat généré par Codemagic (Code signing identities)
#   - profil "Trace Prod" uploadé, bundle app.trace.gpx
#   - intégration App Store Connect : TRACE_APP_STORE_KEY
# ============================================================
workflows:
  ios-native:
    name: Trace iOS (SwiftUI)
    instance_type: mac_mini_m2
    max_build_duration: 45
    integrations:
      app_store_connect: TRACE_APP_STORE_KEY
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.trace.gpx
      xcode: latest
    scripts:
      - name: Générer le projet Xcode (XcodeGen)
        script: |
          which xcodegen || brew install xcodegen
          xcodegen generate
      - name: Numéro de build unique (exigé par TestFlight)
        script: |
          agvtool new-version -all $BUILD_NUMBER
      - name: Appliquer la signature au projet
        script: |
          xcode-project use-profiles
      - name: Build IPA signé
        script: |
          xcode-project build-ipa \
            --project Trace.xcodeproj \
            --scheme Trace
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
