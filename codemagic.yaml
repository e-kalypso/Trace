# ============================================================
# Cloud Mac build for Trace's iOS app (Capacitor).
# Runs on Codemagic's macOS machines — you never need a Mac.
#
# Prerequisites (done via the Codemagic UI):
#   - Add your App Store Connect API key as an integration named
#     exactly "TRACE_APP_STORE_KEY".
#
# The `ios_signing` block below is Codemagic MANAGED signing: it
# creates the distribution certificate + provisioning profile for
# bundle id app.trace.gpx, KEEPS the certificate's private key in your
# Codemagic account (so it's reused every build), installs them in the
# keychain, and `xcode-project use-profiles` applies them to the project.
# Docs: https://docs.codemagic.io/yaml-code-signing/signing-ios/
# ============================================================
workflows:
  ios-capacitor:
    name: Trace iOS (Capacitor)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: TRACE_APP_STORE_KEY
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.trace.gpx
      node: 20.14.0
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install web dependencies
        script: npm ci
      - name: Build web app + sync to iOS
        script: |
          npm run build
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build signed IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
