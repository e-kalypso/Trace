name: Trace
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

schemes:
  Trace:
    build:
      targets:
        Trace: all
    run:
      config: Debug
    archive:
      config: Release

targets:
  Trace:
    type: application
    platform: iOS
    sources:
      - Trace
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.trace.gpx
        PRODUCT_NAME: Trace
        MARKETING_VERSION: 3.0.0
        CURRENT_PROJECT_VERSION: 1
        VERSIONING_SYSTEM: apple-generic
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UIStatusBarStyle: ""
        CODE_SIGN_STYLE: Manual
    info:
      path: Trace/Info.plist
      properties:
        CFBundleDisplayName: Trace
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSLocationWhenInUseUsageDescription: >-
          Trace utilise votre position pour l'afficher sur la carte et vous
          guider le long de vos itinéraires de randonnée.
        NSLocationAlwaysAndWhenInUseUsageDescription: >-
          La position en arrière-plan permet de poursuivre le suivi de votre
          randonnée écran éteint et de vous alerter si vous quittez la trace.
        NSMotionUsageDescription: >-
          Le baromètre de l'iPhone fournit une altitude plus stable que le GPS
          en montagne.
        UIBackgroundModes:
          - location
        # Trace s'enregistre comme application ouvrant les fichiers GPX
        CFBundleDocumentTypes:
          - CFBundleTypeName: Trace GPX
            CFBundleTypeRole: Viewer
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.topografix.gpx
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: com.topografix.gpx
            UTTypeDescription: GPX track
            UTTypeConformsTo:
              - public.xml
            UTTypeTagSpecification:
              public.filename-extension:
                - gpx
              public.mime-type:
                - application/gpx+xml
